version: "3.9"

services:
  backend:
    build: .
    container_name: auto_center_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./staticfiles:/code/staticfiles

  db:
    image: postgres:15
    container_name: auto_center_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auto_center
      POSTGRES_USER: auto_user
      POSTGRES_PASSWORD: auto_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  pgadmin:
    image: dpage/pgadmin4
    container_name: auto_center_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
